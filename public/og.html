<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; overflow: hidden; }
      body {
        position: relative;
        background: #0a0a0b;
        color: #ededec;
        font-family: "Archivo", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .grid {
        position: absolute; inset: 0;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 64px 64px;
        -webkit-mask-image: radial-gradient(ellipse 80% 70% at 30% 0%, #000 30%, transparent 75%);
        mask-image: radial-gradient(ellipse 80% 70% at 30% 0%, #000 30%, transparent 75%);
      }
      .seam {
        position: absolute; top: 0; left: 0; right: 0; height: 3px;
        background: linear-gradient(to right, transparent, rgba(0,220,130,0.7) 50%, transparent);
      }
      .wrap { position: relative; padding: 72px 80px; height: 100%; display: flex; flex-direction: column; }
      .brand { display: flex; align-items: center; gap: 16px; }
      .mark { width: 22px; height: 22px; background: #00dc82; }
      .name { font-size: 26px; font-weight: 800; letter-spacing: -0.01em; }
      .role { font-family: "JetBrains Mono", monospace; font-size: 18px; color: #8b8b94; }
      h1 {
        margin-top: auto;
        font-size: 92px; font-weight: 900; line-height: 0.98; letter-spacing: -0.03em;
        max-width: 980px;
      }
      h1 .accent { color: #00dc82; }
      .sub { margin-top: 28px; font-size: 26px; color: #a6a6ad; max-width: 900px; line-height: 1.4; }
      .tags { margin-top: 40px; display: flex; gap: 12px; }
      .tag {
        font-family: "JetBrains Mono", monospace; font-size: 18px; color: #a6a6ad;
        border: 1px solid rgba(255,255,255,0.16); padding: 8px 16px;
      }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div class="seam"></div>
    <div class="wrap">
      <div class="brand">
        <span class="mark"></span>
        <span class="name">Kuzey Gök</span>
        <span class="role">· Software Engineer @ Microsoft</span>
      </div>

      <h1>I build close to <span class="accent">the metal</span>.</h1>
      <p class="sub">
        Rust tooling, machine learning from scratch, a C++ game engine, and
        Fallout&nbsp;4 reverse-engineering.
      </p>
      <div class="tags">
        <span class="tag">Rust</span>
        <span class="tag">Machine Learning</span>
        <span class="tag">C++ / Vulkan</span>
        <span class="tag">Fallout 4</span>
      </div>
    </div>
  </body>
</html>
